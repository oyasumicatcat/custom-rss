name: Update RSS

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install deps
      run: pip install feedgen feedparser requests beautifulsoup4

    - name: Run script
      run: python main.py

    - name: Commit feed
      run: |
        git config user.name "rss-bot"
        git config user.email "rss@bot.com"
        git add feed.xml
        git commit -m "update feed" || echo "no changes"
        git push
