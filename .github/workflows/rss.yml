name: Update RSS

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 min
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install deps
      run: pip install feedgen feedparser requests beautifulsoup4

    - name: Run script
      run: python main.py

    - name: Commit feed
      run: |
        git config --global user.name "rss-bot"
        git config --global user.email "rss@bot.com"
        git add feed.xml
        git commit -m "update feed" || exit 0
        git push
