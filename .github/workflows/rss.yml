name: Update RSS

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:  # allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install feedparser requests beautifulsoup4 feedgen lxml
        
    - name: Run RSS generator
      run: python main.py
      
    - name: Commit and push if changed
      run: |
        git config --global user.name "RSS Bot"
        git config --global user.email "rss-bot@users.noreply.github.com"
        git add feed.xml
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update RSS feed - $(date +'%Y-%m-%d %H:%M:%S')"
        git push
